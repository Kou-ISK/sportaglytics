name: monthly-architecture-report

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  large-file-report:
    name: Generate large file report
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.1.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate report
        run: pnpm run report:large-files -- --output build/reports/large-files.md

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: large-file-report
          path: build/reports/large-files.md
